name: Query Alpaca Positions & Orders

on:
  workflow_dispatch:

concurrency:
  group: query-alpaca-positions
  cancel-in-progress: false

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Query positions and orders
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          PAPER: ${{ vars.PAPER || 'true' }}
        run: python src/summarize_positions.py
