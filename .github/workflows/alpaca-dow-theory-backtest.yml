name: Alpaca Dow Theory Backtest

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Backtest start date, YYYY-MM-DD"
        required: true
        default: "2025-01-01"
      end:
        description: "Backtest end date, YYYY-MM-DD"
        required: true
        default: "2025-12-31"
      watchlist:
        description: "Comma-separated symbols"
        required: true
        default: "SPY"
      initial_equity:
        description: "Starting equity"
        required: true
        default: "10000"
      swing_n:
        description: "Bars on each side to confirm a swing point"
        required: true
        default: "2"
      risk_fraction:
        description: "Risk per trade as fraction of equity (e.g. 0.02 = 2%)"
        required: true
        default: "0.02"
      output_json:
        description: "Print full JSON result"
        required: true
        type: boolean
        default: false

concurrency:
  group: alpaca-dow-theory-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Dow Theory backtest
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          PAPER: ${{ vars.PAPER || 'true' }}
          DATA_FEED: ${{ vars.DATA_FEED || 'iex' }}
          REWARD_RISK_RATIO: ${{ vars.REWARD_RISK_RATIO || '2.0' }}
          STOP_LOSS_PCT: ${{ vars.STOP_LOSS_PCT || '0.05' }}
          ALLOW_FRACTIONAL: ${{ vars.ALLOW_FRACTIONAL || 'false' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          BACKTEST_START: ${{ inputs.start }}
          BACKTEST_END: ${{ inputs.end }}
          BACKTEST_WATCHLIST: ${{ inputs.watchlist }}
          BACKTEST_INITIAL_EQUITY: ${{ inputs.initial_equity }}
          BACKTEST_SWING_N: ${{ inputs.swing_n }}
          BACKTEST_RISK_FRACTION: ${{ inputs.risk_fraction }}
          BACKTEST_OUTPUT_JSON: ${{ inputs.output_json }}
        run: |
          args=(
            --start "$BACKTEST_START"
            --end "$BACKTEST_END"
            --watchlist "$BACKTEST_WATCHLIST"
            --initial-equity "$BACKTEST_INITIAL_EQUITY"
            --swing-n "$BACKTEST_SWING_N"
            --risk-fraction "$BACKTEST_RISK_FRACTION"
          )
          if [ "$BACKTEST_OUTPUT_JSON" = "true" ]; then
            args+=(--json)
          fi
          python src/backtest_dow_theory.py "${args[@]}"
