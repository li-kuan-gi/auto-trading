name = "auto-trading-scheduler"
main = "worker.js"
compatibility_date = "2026-05-17"
workers_dev = false

[triggers]
# Cloudflare Cron Triggers use UTC.
# sma_trend uses yesterday's confirmed daily close; once per day is sufficient.
# UTC 15:00 = ET 11:00 (DST) / ET 10:00 (standard) — market is open in both cases.
crons = [ "0 15 * * mon-fri" ]

[vars]
GITHUB_OWNER = "li-kuan-gi"
GITHUB_REPO = "auto-trading"
GITHUB_WORKFLOW_FILE = "alpaca-fmp-swing-trader.yml"
GITHUB_REF = "main"
GITHUB_API_VERSION = "2026-03-10"
